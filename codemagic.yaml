workflows:
  ios-workflow:
    name: SurfaceMusic iOS
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build IPA
        script: |
          cd musicapp
          flutter build ipa --release --no-codesign
    artifacts:
      - musicapp/build/ios/ipa/*.ipa
      - musicapp/build/ios/archive/*.xcarchive
      - "**/*.ipa"
      - "**/*.app"