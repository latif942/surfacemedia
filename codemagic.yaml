workflows:
  ios-ipa:
    name: SurfacePlayer
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios && pod install

      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r SurfacePlayer.ipa Payload

    artifacts:
      - build/ios/iphoneos/app.ipa
