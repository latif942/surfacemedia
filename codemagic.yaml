workflows:
  ios-ipa:
    name: SurfacePlayer IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install pods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa